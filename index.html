<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>দৈনিক কবিতা প্রকাশনী | সাহিত্য পোর্টাল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #8e44ad; --bg: #f8f9fa; }
        body { font-family: 'SolaimanLipi', sans-serif; margin: 0; background: var(--bg); }
        
        header { background: white; text-align: center; padding: 30px; border-bottom: 3px solid var(--main); }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        /* কবিতা কার্ড */
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; border-top: 5px solid var(--main); }
        .card:hover { transform: scale(1.02); }
        .card h2 { color: #333; margin: 10px 0; }
        .author { font-size: 14px; color: #777; }

        /* পপ-আপ (Modal) স্টাইল */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; overflow-y: auto; }
        .modal-content { background: white; width: 90%; max-width: 600px; margin: 50px auto; padding: 30px; border-radius: 15px; position: relative; text-align: center; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; color: red; }
        .poem-body { font-size: 18px; line-height: 1.8; color: #444; white-space: pre-line; margin-top: 20px; }

        footer { background: #2c3e50; color: white; text-align: center; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <h1>দৈনিক কবিতা প্রকাশনী</h1>
    <p>মোজাম্মেল হক সাগর সম্পাদিত</p>
</header>

<div class="container">
    <div class="card" onclick="openPoem('গৌরীপুরের বিকেল', 'মোজাম্মেল হক সাগর', 'নদীর পাড়ে বসে থাকা ঐ শান্ত বিকেলে,\nস্মৃতিগুলো কথা বলে যায় আপন খেয়ালে।\nবাতাসের গান আর পাখির গুঞ্জন,\nজুড়িয়ে দেয় আমার তৃষ্ণার্ত এই মন।\n\nবাংলার প্রকৃতি মায়ার বাঁধন,\nছড়িয়ে দেয় আজ নতুন স্বপন।')">
        <span style="color:var(--main); font-weight:bold;"># প্রকৃতি</span>
        <h2>গৌরীপুরের বিকেল</h2>
        <p class="author">লিখেছেন: মোজাম্মেল হক সাগর</p>
        <p>নদীর পাড়ে বসে থাকা ঐ শান্ত বিকেলে...</p>
        <button style="background:var(--main); color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">পুরোটা পড়ুন</button>
    </div>

    <div class="card" onclick="openPoem('স্মৃতির শহর', 'Golpo Lekha Manush', 'গৌরীপুরের ঐ মেঠো পথে,\nযখন বিকেল নামতো,\nহৃদয় জুড়ে কত যে কথা,\nচুপটি করে থামতো।\n\nসেই দিনগুলো আজও মনে পড়ে,\nচোখের কোণে অশ্রু হয়ে ঝরে।')">
        <span style="color:var(--main); font-weight:bold;"># প্রেম ও বিরহ</span>
        <h2>স্মৃতির শহর</h2>
        <p class="author">লিখেছেন: গল্প লেখা মানুষ</p>
        <p>গৌরীপুরের ঐ মেঠো পথে যখন বিকেল নামতো...</p>
        <button style="background:var(--main); color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">পুরোটা পড়ুন</button>
    </div>
</div>

<div id="poemModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closePoem()">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalAuthor" style="color:#777; font-style:italic;"></p>
        <div class="poem-body" id="modalBody"></div>
    </div>
</div>

<footer>
    <p>&copy; ২০২৫ দৈনিক কবিতা প্রকাশনী | ময়মনসিংহ</p>
</footer>

<script>
    function openPoem(title, author, body) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalAuthor').innerText = "কবি: " + author;
        document.getElementById('modalBody').innerText = body;
        document.getElementById('poemModal').style.display = "block";
    }

    function closePoem() {
        document.getElementById('poemModal').style.display = "none";
    }

    // বাইরে ক্লিক করলে বন্ধ হবে
    window.onclick = function(event) {
        if (event.target == document.getElementById('poemModal')) {
            closePoem();
        }
    }
</script>

</body>
</html>
