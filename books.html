<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পিডিএফ বই | দৈনিক কবিতা প্রকাশনী</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { font-family: 'SolaimanLipi', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding-top: 80px; }
        header { background: rgba(13, 17, 23, 0.95); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; position: fixed; top: 0; width: 90%; z-index: 1000; }
        .logo-area { display: flex; align-items: center; gap: 10px; color: white; font-weight: bold; text-decoration:none; }
        .logo-area img { width: 40px; height: 40px; border-radius: 50%; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; font-size: 14px; }
        nav a:hover { color: var(--gold); }

        .container { padding: 40px 5%; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; text-align: center; }
        .book-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #30363d; transition: 0.3s; }
        .book-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .book-cover { width: 120px; height: 170px; background: #30363d; margin: 0 auto 15px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #8b949e; }
        
        .download-btn { background: var(--gold); color: black; padding: 8px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 12px; display: inline-block; margin-top: 10px; }

        footer { text-align: center; padding: 30px; border-top: 1px solid #30363d; margin-top: 50px; font-size:12px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-area">
        <img src="image_9.png" alt="লোগো">
        দৈনিক কবিতা প্রকাশনী
    </a>
    <nav>
        <a href="index.html">হোম</a>
        <a href="poems.html">কবিতা</a>
        <a href="books.html" style="color:var(--gold);">বই</a>
        <a href="design.html">ডিজাইন</a>
    </nav>
</header>

<div class="container">
    <h1 style="color:white; text-align:center; margin-bottom: 40px;">পিডিএফ বই সংগ্রহ</h1>
    <div class="book-grid">
        <div class="book-card">
            <div class="book-cover"><i class="fas fa-file-pdf fa-3x"></i></div>
            <h3 style="color:white; font-size:16px;">রাতের মুসাফির</h3>
            <p style="font-size:12px; color:var(--gold);">কবি: মোজাম্মেল হক সাগর</p>
            <a href="#" class="download-btn">ডাউনলোড</a>
        </div>
    </div>
</div>

<footer>
    <p>&copy; ২০২৬ দৈনিক কবিতা প্রকাশনী | ಗೌরীপুর</p>
</footer>

</body>
</html>
